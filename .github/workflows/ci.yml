name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        otp: ['26', '27']

    steps:
      - uses: actions/checkout@v4

      - name: Install FAISS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libfaiss-dev libomp-dev libopenblas-dev

      - name: Setup Erlang
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          rebar3-version: '3.23'

      - name: Cache rebar3
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/rebar3
            _build
          key: ${{ runner.os }}-rebar3-${{ matrix.otp }}-${{ hashFiles('rebar.lock') }}
          restore-keys: |
            ${{ runner.os }}-rebar3-${{ matrix.otp }}-

      - name: Compile
        run: rebar3 compile

      - name: Run tests
        run: rebar3 ct

      - name: Run dialyzer
        run: rebar3 dialyzer
