name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        otp: ['26', '27']

    container:
      image: erlang:${{ matrix.otp }}-slim

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y cmake libfaiss-dev libomp-dev libopenblas-dev git

      - name: Install rebar3
        run: |
          wget https://s3.amazonaws.com/rebar3/rebar3
          chmod +x rebar3
          mv rebar3 /usr/local/bin/

      - name: Compile
        run: rebar3 compile

      - name: Run tests
        run: rebar3 ct

      - name: Run dialyzer
        run: rebar3 dialyzer
